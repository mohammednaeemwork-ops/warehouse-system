name: Build and Release Windows App

# يشتغل تلقائي بس لما حاجة تخص شكل/سلوك البرنامج نفسه تتغير
# (مش هيشتغل لما تتعدل index.html أو version.json، عشان دول بينشروا لوحدهم عن طريق GitHub Pages)
on:
  push:
    branches: [ main ]
    paths:
      - 'main.js'
      - 'package.json'
      - 'icon.png'
      - 'icon.ico'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and publish Windows installer
        run: npm run build:win:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
